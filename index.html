<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Professional Land Surveying and Reality Capture for homeowners, industry professionals, and real estate experts in the Sea to Sky corridor." />
    <meta name="keywords" content="Land Surveying, Geomatics, Squamish, Whistler, Pemberton, Sea to Sky, Topographic Surveys, Legal Surveys, Reality Capture, 3D Laser Scanning, LiDAR, Photogrammetry" />
    <link rel="icon" type="image/wepb" href="tantalus-logo.webp" />
    <title>Tantalus Geomatics | Land Surveying in the Sea to Sky</title>
    <script type="text/javascript">
      (function(l) {
        if (l.search) {
          var q = {};
          l.search.slice(1).split('&').forEach(function(v) {
            var a = v.split('=');
            q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
          });
          if (q.p !== undefined) {
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + (q.p || '') +
              (q.q ? ('?' + q.q) : '') +
              l.hash
            );
          }
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
